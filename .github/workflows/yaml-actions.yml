name: YAML and Actions

on:
  push:
    branches: [main]
    paths:
      - ".github/**/*.yml"
      - ".github/**/*.yaml"
      - ".yamllint.yml"
      - "justfile"
      - ".github/workflows/yaml-actions.yml"
  pull_request:
    paths:
      - ".github/**/*.yml"
      - ".github/**/*.yaml"
      - ".yamllint.yml"
      - "justfile"
      - ".github/workflows/yaml-actions.yml"

permissions:
  contents: read

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: extractions/setup-just@v3
        with:
          just-version: "1.46.0"
      - name: Install yamllint
        run: python3 -m pip install yamllint==1.38.0
      - name: Lint GitHub YAML
        run: just yamllint

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: extractions/setup-just@v3
        with:
          just-version: "1.46.0"
      - name: Lint GitHub Actions workflows
        run: just actionlint
