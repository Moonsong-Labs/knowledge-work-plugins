name: Shell

on:
  push:
    branches: [main]
    paths:
      - "core-engineering/**/*.sh"
      - "core-engineering/hooks/session-start"
      - ".shellcheckrc"
  pull_request:
    paths:
      - "core-engineering/**/*.sh"
      - "core-engineering/hooks/session-start"
      - ".shellcheckrc"

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run ShellCheck
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t shell_files < <(
            {
              find core-engineering/tests -type f -name '*.sh'
              printf '%s\n' \
                core-engineering/hooks/session-start \
                core-engineering/skills/systematic-debugging/find-polluter.sh
            } | sort
          )
          npx --yes shellcheck@4.1.0 -x "${shell_files[@]}"

  shfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@v3.13.0
      - name: Check shell formatting
        shell: bash
        run: |
          set -euo pipefail
          PATH="$(go env GOPATH)/bin:$PATH"
          mapfile -t shell_files < <(
            {
              find core-engineering/tests -type f -name '*.sh'
              printf '%s\n' \
                core-engineering/hooks/session-start \
                core-engineering/skills/systematic-debugging/find-polluter.sh
            } | sort
          )
          shfmt -d -i 4 -ci "${shell_files[@]}"
