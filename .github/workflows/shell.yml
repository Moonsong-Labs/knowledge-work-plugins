name: Shell

on:
  push:
    branches: [main]
    paths:
      - "core-engineering/**/*.sh"
      - "core-engineering/hooks/session-start"
      - ".shellcheckrc"
      - "justfile"
      - ".github/workflows/shell.yml"
  pull_request:
    paths:
      - "core-engineering/**/*.sh"
      - "core-engineering/hooks/session-start"
      - ".shellcheckrc"
      - "justfile"
      - ".github/workflows/shell.yml"

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: extractions/setup-just@v3
        with:
          just-version: "1.46.0"
      - name: Run ShellCheck
        run: just shellcheck

  shfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: extractions/setup-just@v3
        with:
          just-version: "1.46.0"
      - name: Check shell formatting
        run: just shfmt-check
