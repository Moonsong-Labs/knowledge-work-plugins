name: Markdown

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.yaml"
      - "justfile"
      - ".github/workflows/markdown.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.yaml"
      - "justfile"
      - ".github/workflows/markdown.yml"

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: extractions/setup-just@v3
        with:
          just-version: "1.46.0"
      - name: Lint Markdown
        run: just markdown
