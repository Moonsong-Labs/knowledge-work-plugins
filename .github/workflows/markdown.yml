name: Markdown

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.yaml"
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.yaml"

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Lint Markdown
        run: npx --yes markdownlint-cli2@0.21.0
