name: Skills Spec

on:
  push:
    branches: [main]
    paths:
      - "**/SKILL.md"
      - "justfile"
      - ".github/workflows/skills-spec.yml"
  pull_request:
    paths:
      - "**/SKILL.md"
      - "justfile"
      - ".github/workflows/skills-spec.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: extractions/setup-just@v3
        with:
          just-version: "1.46.0"
      - name: Install skills-ref
        run: >-
          python3 -m pip install
          "git+https://github.com/agentskills/agentskills.git@0c61f1efc081cbb1ffe3420f6bbcb5b08920e133#subdirectory=skills-ref"
      - name: Validate skills
        run: just skills-spec
