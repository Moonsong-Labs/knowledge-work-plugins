version: 1
metadata:
  display_name: Skill Reviewer
  short_description: Review reusable agent artifacts against shared standards with topology checks and refactor plans
  default_prompt: Audit a reusable agent artifact such as a `SKILL.md` bundle or standalone agent definition. Evaluate it against the shared skill standards and local reviewer adapters, use structured findings with P1/P2/P3 priorities, cite rule IDs when relevant, then synthesize a compact refactor plan. Do not use numeric scores.
